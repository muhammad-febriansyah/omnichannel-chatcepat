# Nginx reverse proxy ChatCepat (prod).
# Topologi (docker-compose.prod.yml): gateway 127.0.0.1:8080, web 127.0.0.1:3000.
#   /webhooks/*  -> gateway (webhook Meta/Telegram; verify HMAC butuh body utuh)
#   /ws          -> gateway (WebSocket realtime dashboard)
#   /            -> web (Next.js)
#
# CATATAN: JANGAN proxy /channels ke gateway — itu route dashboard web. QR pairing
# unofficial (gateway /channels/{id}/qr) diakses web via env gateway terpisah, bukan
# lewat origin ini.
#
# Pasang: salin ke /etc/nginx/sites-available/chatcepat.conf → symlink ke
# sites-enabled → `nginx -t` → `systemctl reload nginx`. TLS: certbot --nginx.

upstream cc_gateway { server 127.0.0.1:8080; keepalive 16; }
upstream cc_web     { server 127.0.0.1:3000; keepalive 16; }

# HTTP -> HTTPS (kecuali ACME challenge certbot).
server {
    listen 80;
    listen [::]:80;
    server_name chatcepat.id www.chatcepat.id;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# Canonical host = apex (chatcepat.id). www → apex 301 supaya cookie sesi host-only
# + redirect_uri OAuth Meta selalu di host yang sama (cegah bounce ke /login).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.chatcepat.id;
    ssl_certificate     /etc/letsencrypt/live/chatcepat.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatcepat.id/privkey.pem;
    return 301 https://chatcepat.id$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name chatcepat.id;

    # TLS (certbot --nginx mengisi path ini otomatis; sesuaikan bila manual).
    ssl_certificate     /etc/letsencrypt/live/chatcepat.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatcepat.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Batas body (webhook kecil; upload web pakai route sendiri).
    client_max_body_size 16m;

    # --- Webhook channel -> gateway ---
    # Body diteruskan utuh (signature X-Hub-Signature-256 dihitung atas raw body).
    location /webhooks/ {
        proxy_pass http://cc_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;   # default; jangan stream agar body utuh
        proxy_read_timeout 30s;
    }

    # --- WebSocket realtime -> gateway ---
    location /ws {
        proxy_pass http://cc_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;     # koneksi WS lama
        proxy_send_timeout 3600s;
    }

    # --- Sisanya -> web (Next.js) ---
    location / {
        proxy_pass http://cc_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
